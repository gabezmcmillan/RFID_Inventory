; Per-machine settings for the RFID Inventory app.
;
; This is a template: copy it to settings.ini next to RFIDInventory.exe (or
; next to app.py when running from source) and fill in the values for this
; machine. settings.ini is gitignored because it holds per-machine secrets
; (mistral_api_key, sync_token) -- never commit the real file.
;
; Every entry is optional: remove or blank a line to fall back to the app's
; built-in default from config.py.

[settings]
; Serial port of the RFID handheld. "auto" scans the system's ports for the
; reader (a TSL 1128 / FTDI USB-serial device). To pin it explicitly:
;   Windows: COM3   (see Device Manager > Ports (COM & LPT))
;   macOS:   /dev/cu.usbserial-1128_US_V01336
serial_port = auto

; Label printer (Zebra ZD621R), raw ZPL. Two ways to reach it -- set ONE
; (leave both blank to disable label printing on this machine):
;
; USB (Windows only): the printer's Windows print-queue name, exactly as it
; appears in Settings > Printers & scanners (install Zebra's ZDesigner driver
; first). Takes precedence over printer_host if both are set.
;   printer_queue = ZDesigner ZD621R-300dpi ZPL
printer_queue =
;
; Network: the printer's IP on the warehouse LAN, raw ZPL over TCP. The IP is
; DHCP-assigned: if labels stop printing, check the current address on the
; printer's LCD (Menu > Network > Wired) and update it here.
printer_host =
printer_port = 9100

; PIN for the Admin view.
admin_pin = 1234

; Mistral OCR (optional). With an API key (Mistral Studio > API Keys), BOL
; field extraction (BOL #, PO #, Vendor) runs through Mistral's OCR 4 cloud
; API, which reads the form layout far better than the local Tesseract pass.
; Needs internet at scan time; when the call fails or this is blank, the app
; falls back to the local OCR text + heuristics automatically.
mistral_api_key =

; Address the local web server listens on. Change the port only if 8000 is
; already taken on this machine.
host = 127.0.0.1
port = 8000

; --- Cloud sync (optional) ---------------------------------------------------
; When cloud_url is set, the app pushes inventory to the cloud site and pulls
; material requests in the background. Leave it blank (or remove it) to run
; fully standalone -- everything else works without a cloud.
;   cloud_url  = https://rfid-inventory-sync.magnus.brasfieldgorrie.app
;   sync_token = the same secret the cloud app was deployed with (SYNC_TOKEN)
cloud_url =
sync_token =
; Master switch and how often to sync (seconds). Failures back off on their
; own, so there is no harm leaving this on while offline.
sync_enabled = true
sync_interval_seconds = 30
