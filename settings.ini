; Per-machine settings for the RFID Inventory app.
; Keep this file next to RFIDInventory.exe (or next to app.py when running
; from source). Every entry is optional: remove or blank a line to fall back
; to the app's built-in default from config.py.

[settings]
; Serial port of the RFID handheld. "auto" scans the system's ports for the
; reader (a TSL 1128 / FTDI USB-serial device). To pin it explicitly:
;   Windows: COM3   (see Device Manager > Ports (COM & LPT))
;   macOS:   /dev/cu.usbserial-1128_US_V01336
serial_port = auto

; PIN for the Admin view.
admin_pin = 1234

; Address the local web server listens on. Change the port only if 8000 is
; already taken on this machine.
host = 127.0.0.1
port = 8000

; --- Cloud sync (optional) ---------------------------------------------------
; When cloud_url is set, the app pushes inventory to the cloud site and pulls
; material requests in the background. Leave it blank (or remove it) to run
; fully standalone -- everything else works without a cloud.
;   cloud_url  = https://switch-warehouse.brasfieldgorrie.com
;   sync_token = the same secret the cloud app was deployed with (SYNC_TOKEN)
cloud_url = http://127.0.0.1:8100
sync_token = dev-token 
; Master switch and how often to sync (seconds). Failures back off on their
; own, so there is no harm leaving this on while offline.
sync_enabled = true
sync_interval_seconds = 30
